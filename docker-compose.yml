services:
  db:
    image: postgres:15
    container_name: ledgerzero-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ledgerzero
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ledgerzero"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: 
      context: ./ledgerzero-web
      dockerfile: Dockerfile
    container_name: ledgerzero-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/ledgerzero
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
