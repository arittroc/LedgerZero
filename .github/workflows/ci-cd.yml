name: LedgerZero CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ledgerzero-web/package-lock.json

    - name: Install Dependencies
      run: npm ci
      working-directory: ./ledgerzero-web

    - name: Prettier Check
      run: npx prettier --check .
      working-directory: ./ledgerzero-web

    - name: Lint Check
      run: npm run lint
      working-directory: ./ledgerzero-web

    - name: TypeScript Build Check
      run: npm run build
      working-directory: ./ledgerzero-web
      env:
        DATABASE_URL: "postgresql://user:password@localhost:5432/ledgerzero"
        JWT_SECRET: "test_secret"
        NEXT_TELEMETRY_DISABLED: 1
